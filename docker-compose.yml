services:
  eureka:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"

  pricingservice:
    build: ./PricingService
    container_name: pricing-service
    ports:
      - "5001:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
    depends_on:
      - eureka
    restart: always

  policyservice:
    build: ./PolicyService
    container_name: policy-service
    ports:
      - "5002:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
    depends_on:
      - eureka
    restart: always

  apigateway:
    build: ./ApiGateway
    container_name: api-gateway
    ports:
      - "5050:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
    depends_on:
      - eureka
    restart: always