version: '3.8'

services:
  # RabbitMQ - Message Queue
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis - Caching
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # PostgreSQL - Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lab_netmicro_payments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234567890aA@
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lab_netmicro_payments"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Auth Service
  authservice:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    container_name: authservice
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    networks:
      - microservices-network
    depends_on:
      postgres:
        condition: service_healthy

  # Policy Service
  policyservice:
    build:
      context: ./PolicyService
      dockerfile: Dockerfile
    container_name: policyservice
    ports:
      - "5002:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - RabbitMQ__Host=rabbitmq
      - ConnectionStrings__PgConnection=Host=postgres;Port=5432;Database=lab_netmicro_payments;Username=postgres;Password=1234567890aA@
    networks:
      - microservices-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Chat Service
  chatservice:
    build:
      context: ./ChatService
      dockerfile: Dockerfile
    container_name: chatservice
    ports:
      - "5003:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - RabbitMQ__Host=rabbitmq
      - JWT__Key=your-super-secret-jwt-key-that-is-at-least-32-characters-long
      - JWT__Issuer=ChatService
      - JWT__Audience=ChatService
    networks:
      - microservices-network
    depends_on:
      rabbitmq:
        condition: service_healthy

  # Payment Service
  paymentservice:
    build:
      context: ./PaymentService
      dockerfile: Dockerfile
    container_name: paymentservice
    ports:
      - "5004:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__PgConnection=Host=postgres;Port=5432;Database=lab_netmicro_payments;Username=postgres;Password=1234567890aA@
    networks:
      - microservices-network
    depends_on:
      postgres:
        condition: service_healthy

  # Pricing Service
  pricingservice:
    build:
      context: ./PricingService
      dockerfile: Dockerfile
    container_name: pricingservice
    ports:
      - "5005:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    networks:
      - microservices-network

  # API Gateway
  apigateway:
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    container_name: apigateway
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Redis__ConnectionString=redis:6379
    networks:
      - microservices-network
    depends_on:
      redis:
        condition: service_healthy
      authservice:
        condition: service_started
      policyservice:
        condition: service_started
      chatservice:
        condition: service_started
      paymentservice:
        condition: service_started
      pricingservice:
        condition: service_started

volumes:
  rabbitmq_data:
  postgres_data:

networks:
  microservices-network:
    driver: bridge