<!DOCTYPE html>
<html>
<head>
    <title>SignalR Connection Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
</head>
<body>
    <h1>SignalR Connection Test</h1>
    <div id="status">Disconnected</div>
    <button onclick="testConnection()">Test Connection</button>
    <div id="logs"></div>

    <script>
        let connection = null;

        function log(message) {
            const logs = document.getElementById('logs');
            logs.innerHTML += '<div>' + new Date().toLocaleTimeString() + ': ' + message + '</div>';
            console.log(message);
        }

        async function testConnection() {
            try {
                log('Step 1: Getting agent token...');
                
                const response = await fetch('http://localhost:5003/api/auth/agent-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        agentId: 'test-agent',
                        agentName: 'Test Agent'
                    })
                });

                if (!response.ok) {
                    throw new Error(`Auth failed: ${response.status}`);
                }

                const data = await response.json();
                log('Step 2: Token received: ' + data.token.substring(0, 20) + '...');

                log('Step 3: Creating SignalR connection...');
                connection = new signalR.HubConnectionBuilder()
                    .withUrl("http://localhost:5003/chathub", {
                        accessTokenFactory: () => data.token,
                        skipNegotiation: true,
                        transport: signalR.HttpTransportType.WebSockets
                    })
                    .configureLogging(signalR.LogLevel.Debug)
                    .build();

                connection.onclose((error) => {
                    log('Connection closed: ' + (error || 'No error'));
                    document.getElementById('status').textContent = 'Disconnected';
                });

                connection.on("ReceiveNotification", function (message) {
                    log('Notification: ' + message);
                });

                connection.on("AgentJoined", function (agentId) {
                    log('Agent joined: ' + agentId);
                });

                log('Step 4: Starting connection...');
                await connection.start();
                log('Step 5: Connection started successfully!');
                document.getElementById('status').textContent = 'Connected';

                log('Step 6: Joining agent group...');
                await connection.invoke("JoinAgentGroup", "test-agent");
                log('Step 7: Joined agent group successfully!');

            } catch (error) {
                log('ERROR: ' + error.message);
                console.error('Full error:', error);
                document.getElementById('status').textContent = 'Failed: ' + error.message;
            }
        }
    </script>
</body>
</html>
