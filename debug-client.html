<!DOCTYPE html>
<html>
<head>
    <title>Debug Client App</title>
</head>
<body>
    <h1>Debug Client App - Policy Creation</h1>
    
    <div>
        <label>Customer Name:</label>
        <input type="text" id="customerName" value="Test Customer Debug">
        <button onclick="createPolicy()">Create Policy</button>
    </div>
    
    <div id="policyStatus">Ready</div>
    <div id="result"></div>

    <script>
        // Exact same function as in main client app
        async function createPolicy() {
            const policyData = {
                customerName: document.getElementById('customerName').value
            };

            try {
                document.getElementById('policyStatus').textContent = 'Creating policy...';
                console.log('Sending request to PolicyService...', policyData);
                
                const response = await fetch('http://localhost:5002/api/policy/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(policyData)
                });

                console.log('Response received:', response.status, response.statusText);

                if (response.ok) {
                    const result = await response.json();
                    console.log('Response data:', result);
                    
                    document.getElementById('policyStatus').textContent = 'Policy created successfully!';
                    document.getElementById('result').innerHTML = `
                        <h3>✅ SUCCESS!</h3>
                        <p><strong>Policy Number:</strong> ${result.policy.number}</p>
                        <p><strong>Customer:</strong> ${result.policy.customerName}</p>
                        <p><strong>Premium:</strong> $${result.policy.premium}</p>
                        <p><strong>Status:</strong> ${result.policy.status}</p>
                        <p><strong>Event Published:</strong> ${result.eventPublished}</p>
                    `;
                    
                    // This is the line that was causing the error in main app
                    console.log('Policy number (lowercase):', result.policy.number);
                    console.log('Policy Number (uppercase - would cause error):', result.policy.Number);
                    
                } else {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to create policy');
                }
            } catch (error) {
                console.error('Create policy failed:', error);
                document.getElementById('policyStatus').textContent = `Failed: ${error.message}`;
                document.getElementById('result').innerHTML = `<h3>❌ ERROR!</h3><p>${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
